name: Verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.10.0
      - uses: actions/setup-node@v6
        with:
          node-version: 26.5.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: git diff --exit-code -- dist
