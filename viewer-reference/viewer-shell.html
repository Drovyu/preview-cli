<script>
(async () => {
  const fragment = new URLSearchParams(location.hash.slice(1));
  const key = fragment.get("k");
  const fallbackBasePath = "/";
  function cleanPreviewRoute(value) {
    if (!value || value.length > 2048) return null;
    try {
      const route = new URL(value, location.origin);
      if (route.origin !== location.origin) return null;
      route.searchParams.delete("__dvy_sw_retry");
      return route.pathname + route.search + route.hash;
    } catch {
      return null;
    }
  }
  const savedRoute = cleanPreviewRoute(fragment.get("r"));
  const initialPreviewFramePath = savedRoute && savedRoute.startsWith("/_preview/") && savedRoute.length <= 2048
    ? savedRoute
    : "/_preview/";
  const status = document.getElementById("status");
  const steps = ["プレビューを読み込んでいます…", "プレビューを復号しています…", "まもなく表示されます…"];
  const stepDuration = 1900;
  let stepIndex = 0;
  let stepTimer;
  let previewFrame = null;
  let fallbackPromise = null;
  let metadataObserver = null;
  let activeRegistration = null;
  let activeWorker = null;
  let bypassRecoveryAttempted = false;
  const commentToolbar = document.getElementById("dvy-comment-toolbar");
  const commentToolbarSend = commentToolbar.querySelector('[data-command="send"]');
  const commentDisplayNameKey = "dvyu-comment-display-name";
  const notificationClientIdKey = "dvyu-notification-client-id";
  function getNotificationClientId() {
    try {
      const existing = localStorage.getItem(notificationClientIdKey) || "";
      if (/^[A-Za-z0-9_-]{22}$/.test(existing)) return existing;
    } catch {}
    const bytes = crypto.getRandomValues(new Uint8Array(16));
    let binary = "";
    for (const byte of bytes) binary += String.fromCharCode(byte);
    const created = btoa(binary).replaceAll("+", "-").replaceAll("/", "_").replaceAll("=", "");
    try { localStorage.setItem(notificationClientIdKey, created); } catch {}
    return created;
  }
  function mountPreviewFrame(frame) {
    metadataObserver?.disconnect();
    frame.addEventListener("load", syncPreviewMetadata);
    document.body.replaceChildren(commentToolbar, frame);
  }
  function syncPreviewMetadata() {
    const doc = previewFrame?.contentDocument;
    if (!doc?.head) return;
    function apply() {
      const title = doc.title?.trim();
      document.title = (title || "Preview") + " by Drovyu";
    }
    apply();
    metadataObserver?.disconnect();
    metadataObserver = new MutationObserver(apply);
    metadataObserver.observe(doc.head, { subtree: true, childList: true, attributes: true, characterData: true });
  }
  for (const button of commentToolbar.querySelectorAll("[data-command]")) {
    button.addEventListener("click", () => previewFrame?.contentWindow?.postMessage({ type: "DVY_COMMENT_COMMAND", id: "000000000000000000000000", command: button.dataset.command }, location.origin));
  }
  window.addEventListener("message", (event) => {
    if (event.origin !== location.origin || event.data?.id !== "000000000000000000000000") return;
    const root = event.source === previewFrame?.contentWindow;
    if (event.data.type === "DVY_SW_BYPASS" && root) {
      const recovery = !bypassRecoveryAttempted && activeWorker
        ? (bypassRecoveryAttempted = true, retryPreviewThroughServiceWorker())
        : renderFallback();
      recovery.catch((error) => {
        console.error("[Drovyu Preview] Fallback rendering failed.", error);
        renderFallback().catch((fallbackError) => {
          console.error("[Drovyu Preview] Fallback rendering failed.", fallbackError);
          showDecryptError();
        });
      });
      return;
    }
    if (event.data.type === "DVY_COMMENT_REQUEST_KEY") {
      event.source?.postMessage?.({ type: "DVY_COMMENT_KEY", id: "000000000000000000000000", key, root }, location.origin);
      return;
    }
    const cleanCommentRoute = event.data.type === "DVY_COMMENT_ROUTE" && root && typeof event.data.route === "string"
      ? cleanPreviewRoute(event.data.route)
      : null;
    if (cleanCommentRoute && cleanCommentRoute.startsWith("/_preview/")) {
      const next = new URLSearchParams(location.hash.slice(1));
      next.set("r", cleanCommentRoute);
      history.replaceState(null, "", location.pathname + location.search + "#" + next.toString());
      return;
    }
    if (event.data.type === "DVY_COMMENT_MODE" && root) {
      const active = event.data.active === true;
      document.body.classList.toggle("dvy-comment-mode", active);
      commentToolbar.hidden = !active;
      return;
    }
    if (event.data.type === "DVY_COMMENT_DRAFTS" && root && Number.isInteger(event.data.count)) {
      const count = Math.max(0, Math.min(25, event.data.count));
      commentToolbarSend.textContent = "送信 " + count;
      commentToolbarSend.disabled = count === 0 || event.data.sending === true;
      return;
    }
    if (event.data.type === "DVY_COMMENT_NAME_GET" && root) {
      let name = "";
      try { name = localStorage.getItem(commentDisplayNameKey) || ""; } catch {}
      event.source?.postMessage?.({ type: "DVY_COMMENT_NAME", id: "000000000000000000000000", name }, location.origin);
      return;
    }
    if (event.data.type === "DVY_NOTIFICATION_CLIENT_GET" && root) {
      event.source?.postMessage?.({ type: "DVY_NOTIFICATION_CLIENT", id: "000000000000000000000000", clientId: getNotificationClientId() }, location.origin);
      return;
    }
    if (event.data.type === "DVY_COMMENT_NAME_SET" && root && typeof event.data.name === "string") {
      const name = event.data.name.trim().slice(0, 40);
      try {
        if (name) localStorage.setItem(commentDisplayNameKey, name);
        else localStorage.removeItem(commentDisplayNameKey);
      } catch {}
      event.source?.postMessage?.({ type: "DVY_COMMENT_NAME", id: "000000000000000000000000", name }, location.origin);
    }
  });
  function showStep(index) {
    if (!status || status.classList.contains("is-error")) return;
    const el = document.createElement("span");
    el.textContent = steps[index];
    el.style.animation = "statusIn " + stepDuration + "ms ease both";
    status.appendChild(el);
    el.addEventListener("animationend", () => el.remove());
  }
  function startLoadingSteps() {
    showStep(0);
    stepTimer = setInterval(() => {
      stepIndex = (stepIndex + 1) % steps.length;
      showStep(stepIndex);
    }, stepDuration);
  }
  function showError(message) {
    clearInterval(stepTimer);
    status.className = "is-error";
    status.textContent = message;
  }
  function showDecryptError() {
    showError("復号に失敗しました。URLのキーが正しいか、リンクが壊れていないか確認してください。");
  }
  startLoadingSteps();
  if (!key) { showError("Missing preview key."); return; }
  function b64u(value) {
    const base = value.replaceAll("-", "+").replaceAll("_", "/").padEnd(Math.ceil(value.length / 4) * 4, "=");
    const bin = atob(base);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }
  navigator.serviceWorker?.addEventListener("message", (event) => {

  async function fetchWithRetry(input, init) {
    let lastError;
    for (let attempt = 0; attempt < 3; attempt++) {

        const response = await fetch(input, init);
        if (!response.ok) throw new Error("Preview resource request failed (" + response.status + ").");
        return response;
      } catch (error) {
        lastError = error;
        if (attempt < 2) await new Promise((resolve) => setTimeout(resolve, 180 * (attempt + 1)));
      }
    }
    throw lastError;
  }

    if (!previewKeyPromise) previewKeyPromise = crypto.subtle.importKey("raw", b64u(key), "AES-GCM", false, ["decrypt"]);
    return previewKeyPromise;
  }
  async function loadManifest(cryptoKey) {

        const encryptedManifest = await (await fetchWithRetry("/__dvy/api/p/000000000000000000000000/manifest", { cache: "no-store" })).json();
        const manifestBytes = new Uint8Array(await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64u(encryptedManifest.encryption.iv) },
          cryptoKey,
          b64u(encryptedManifest.ciphertext)
        ));
        return JSON.parse(new TextDecoder().decode(manifestBytes));
      })();
    }
    return manifestPromise;
  }
  function injectBadge() {
    if (!true) return;
    if (document.getElementById("dvy-fallback-badge")) return;
    const host = document.createElement("div");
    host.id = "dvy-fallback-badge";
